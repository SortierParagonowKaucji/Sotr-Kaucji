<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kaucja Mobile</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sora', sans-serif;
            background-color: #1A1206;
            color: #FFFDEB;
            -webkit-tap-highlight-color: transparent;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #CC953E !important;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker zarejestrowany!'))
                    .catch(err => console.log('Błąd SW: ', err));
            });
        }

        const PALETTE = {
            amber: '#CC953E',
            dark: '#1A1206',
            gray: '#2C251A',
            lightGray: '#3D3526',
            textMuted: '#A39989',
            red: '#EF4444',
            green: '#10B981'
        };

        const Icon = ({ name, size = 24, color = "currentColor" }) => {
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size, color: color, display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [receipts, setReceipts] = React.useState(() => {
                const saved = localStorage.getItem('kaucja_receipts');
                return saved ? JSON.parse(saved) : [];
            });
            const [showModal, setShowModal] = React.useState(false);
            const [showDetailModal, setShowDetailModal] = React.useState(false);
            const [selectedReceipt, setSelectedReceipt] = React.useState(null);
            
            // Stan formularza
            const [title, setTitle] = React.useState('');
            const [store, setStore] = React.useState('');
            const [date, setDate] = React.useState(new Date().toISOString().split('T')[0]);
            const [depositItems, setDepositItems] = React.useState([{ name: 'Butelka zwrotna', quantity: 1, price: 1.00 }]);
            const [image, setImage] = React.useState(null);
            const [uploading, setUploading] = React.useState(false);

            React.useEffect(() => {
                localStorage.setItem('kaucja_receipts', JSON.stringify(receipts));
            }, [receipts]);

            const handleAddDepositItem = () => {
                setDepositItems([...depositItems, { name: '', quantity: 1, price: 1.00 }]);
            };

            const handleRemoveDepositItem = (index) => {
                if (depositItems.length > 1) {
                    setDepositItems(depositItems.filter((_, i) => i !== index));
                }
            };

            const handleItemChange = (index, field, value) => {
                const newItems = [...depositItems];
                newItems[index][field] = value;
                setDepositItems(newItems);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImage(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!title || !store) return;

                const totalDeposit = depositItems.reduce((sum, item) => sum + (item.quantity * parseFloat(item.price || 0)), 0);

                const newReceipt = {
                    id: Date.now().toString(),
                    title,
                    store,
                    date,
                    items: depositItems.map(item => ({
                        ...item,
                        quantity: parseInt(item.quantity) || 1,
                        price: parseFloat(item.price) || 0
                    })),
                    totalDeposit,
                    image,
                    returned: false
                };

                setReceipts([newReceipt, ...receipts]);
                
                // Reset formularza
                setTitle('');
                setStore('');
                setDate(new Date().toISOString().split('T')[0]);
                setDepositItems([{ name: 'Butelka zwrotna', quantity: 1, price: 1.00 }]);
                setImage(null);
                setShowModal(false);
            };

            const toggleReturned = (id, e) => {
                e.stopPropagation();
                setReceipts(receipts.map(r => r.id === id ? { ...r, returned: !r.returned } : r));
            };

            const handleDelete = (id, e) => {
                e.stopPropagation();
                setReceipts(receipts.filter(r => r.id !== id));
                setShowDetailModal(false);
            };

            const totalActiveDeposit = receipts
                .filter(r => !r.returned)
                .reduce((sum, r) => sum + r.totalDeposit, 0);

            return (
                <div className="min-h-screen p-4 pb-24 flex flex-col justify-between max-w-md mx-auto">
                    <div>
                        <header className="py-4 flex justify-between items-center border-b border-[#2C251A] mb-6">
                            <div className="flex items-center gap-2">
                                <div className="p-2 bg-[#2C251A] rounded-xl border border-amber-900/20">
                                    <Icon name="receipt" size={24} color={PALETTE.amber} />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight">Kaucja Mobile</h1>
                            </div>
                            <div className="text-right">
                                <span className="text-xs text-[#A39989] block uppercase tracking-wider font-semibold">Suma kaucji</span>
                                <span className="text-lg font-bold text-emerald-400">{totalActiveDeposit.toFixed(2)} zł</span>
                            </div>
                        </header>

                        {receipts.length === 0 ? (
                            <main className="flex-1 flex flex-col items-center justify-center py-20 text-center">
                                <div className="bg-[#2C251A] p-8 rounded-2xl shadow-xl w-full border border-amber-900/20">
                                    <div className="w-16 h-16 bg-[#1A1206] rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-900/10">
                                        <Icon name="archive" size={32} color={PALETTE.amber} />
                                    </div>
                                    <h2 className="text-lg font-semibold text-[#FFFDEB]">Brak paragonów</h2>
                                    <p className="mt-2 text-sm text-[#A39989] leading-relaxed">
                                        Aplikacja, w której masz wszystkie paragony i kaucje w jednym miejscu. Dodaj swój pierwszy paragon klikając na plus poniżej.
                                    </p>
                                </div>
                            </main>
                        ) : (
                            <div className="space-y-3">
                                {receipts.map(receipt => (
                                    <div 
                                        key={receipt.id}
                                        onClick={() => { setSelectedReceipt(receipt); setShowDetailModal(true); }}
                                        className={`p-4 rounded-2xl bg-[#2C251A] border transition-all active:scale-[0.99] flex justify-between items-center ${receipt.returned ? 'border-transparent opacity-50' : 'border-amber-900/10 shadow-md'}`}
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className={`p-3 rounded-xl flex items-center justify-center ${receipt.returned ? 'bg-[#1A1206] text-gray-500' : 'bg-[#1A1206] text-[#CC953E]'}`}>
                                                <Icon name={receipt.returned ? "check-circle" : "clock"} size={22} />
                                            </div>
                                            <div>
                                                <h3 className="font-semibold text-sm text-[#FFFDEB] line-clamp-1">{receipt.title}</h3>
                                                <p className="text-xs text-[#A39989] flex items-center gap-1 mt-0.5">
                                                    <span>{receipt.store}</span>
                                                    <span>•</span>
                                                    <span>{receipt.date}</span>
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <div className="text-right">
                                                <span className={`text-sm font-bold block ${receipt.returned ? 'text-[#A39989] line-through' : 'text-emerald-400'}`}>
                                                    +{receipt.totalDeposit.toFixed(2)} zł
                                                </span>
                                                <span className="text-[10px] text-[#A39989] block">
                                                    {receipt.items.reduce((s, i) => s + i.quantity, 0)} szt.
                                                </span>
                                            </div>
                                            <button 
                                                onClick={(e) => toggleReturned(receipt.id, e)}
                                                className={`p-2 rounded-lg transition-colors ${receipt.returned ? 'bg-emerald-500/10 text-emerald-400' : 'bg-[#1A1206] text-[#A39989] hover:bg-[#3D3526]'}`}
                                            >
                                                <Icon name="check" size={18} />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Poprawiony przycisk dodawania */}
                    <button onClick={() => setShowModal(true)} disabled={uploading} className="fixed bottom-8 right-8 rounded-full p-4 flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50" style={{ backgroundColor: PALETTE.amber, boxShadow: "0px 24px 48px -12px rgba(204,149,62,0.35), 0px 8px 16px -4px rgba(204,149,62,0.2)" }} aria-label="Dodaj paragon">
                        <Icon name="plus" size={28} color="#1A1206" />
                    </button>

                    {/* Modal formularza */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-[#1A1206] w-full max-w-md rounded-t-3xl sm:rounded-3xl border border-amber-900/20 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl flex flex-col">
                                <div className="p-4 border-b border-[#2C251A] flex justify-between items-center sticky top-0 bg-[#1A1206] z-10">
                                    <h2 className="text-lg font-bold">Nowy paragon z kaucją</h2>
                                    <button onClick={() => setShowModal(false)} className="p-2 bg-[#2C251A] rounded-xl text-[#A39989]">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="p-5 space-y-4 flex-1">
                                    <div>
                                        <label className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-1.5">Nazwa własna</label>
                                        <input type="text" placeholder="np. Zakupy na imprezę, Grill u Marka" value={title} onChange={e => setTitle(e.target.value)} required className="w-full bg-[#2C251A] border border-amber-900/10 rounded-xl p-3 text-sm text-[#FFFDEB]" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-1.5">Sklep</label>
                                            <input type="text" placeholder="Biedronka, Lidl..." value={store} onChange={e => setStore(e.target.value)} required className="w-full bg-[#2C251A] border border-amber-900/10 rounded-xl p-3 text-sm text-[#FFFDEB]" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-1.5">Data zakupu</label>
                                            <input type="date" value={date} onChange={e => setDate(e.target.value)} required className="w-full bg-[#2C251A] border border-amber-900/10 rounded-xl p-3 text-sm text-[#FFFDEB]" />
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-xs font-semibold uppercase tracking-wider text-[#A39989]">Pozycje objęte kaucją</label>
                                            <button type="button" onClick={handleAddDepositItem} className="text-xs text-[#CC953E] font-medium flex items-center gap-1 bg-[#2C251A] px-2.5 py-1 rounded-lg border border-amber-900/10">
                                                <Icon name="plus" size={14} /> Dodaj
                                            </button>
                                        </div>
                                        
                                        <div className="space-y-2 max-h-48 overflow-y-auto no-scrollbar pr-1">
                                            {depositItems.map((item, index) => (
                                                <div key={index} className="flex gap-2 items-center bg-[#2C251A] p-2.5 rounded-xl border border-amber-900/5">
                                                    <input type="text" placeholder="Nazwa przedmiotu" value={item.name} onChange={e => handleItemChange(index, 'name', e.target.value)} required className="flex-1 bg-[#1A1206] border border-transparent rounded-lg p-2 text-xs text-[#FFFDEB]" />
                                                    <input type="number" placeholder="Ilość" min="1" value={item.quantity} onChange={e => handleItemChange(index, 'quantity', e.target.value)} required className="w-14 bg-[#1A1206] border border-transparent rounded-lg p-2 text-xs text-[#FFFDEB] text-center" />
                                                    <input type="number" placeholder="Cena" step="0.01" min="0" value={item.price} onChange={e => handleItemChange(index, 'price', e.target.value)} required className="w-16 bg-[#1A1206] border border-transparent rounded-lg p-2 text-xs text-[#FFFDEB] text-center" />
                                                    {depositItems.length > 1 && (
                                                        <button type="button" onClick={() => handleRemoveDepositItem(index)} className="text-red-400 p-1">
                                                            <Icon name="trash-2" size={16} />
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-1.5">Zdjęcie paragonu (opcjonalnie)</label>
                                        <div className="relative border-2 border-dashed border-amber-900/20 rounded-xl p-4 bg-[#2C251A] flex flex-col items-center justify-center text-center cursor-pointer min-h-24">
                                            <input type="file" accept="image/*" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                            {image ? (
                                                <div className="flex items-center gap-2 text-emerald-400 text-xs font-medium">
                                                    <Icon name="image" size={18} /> Zdjęcie załadowane pomyślnie
                                                </div>
                                            ) : (
                                                <>
                                                    <Icon name="camera" size={24} color={PALETTE.textMuted} />
                                                    <span className="text-xs text-[#A39989] mt-1.5">Kliknij, aby zrobić zdjęcie lub wybrać plik</span>
                                                </>
                                            )}
                                        </div>
                                    </div>

                                    <button type="submit" className="w-full bg-[#CC953E] text-[#1A1206] font-bold p-3.5 rounded-xl text-sm transition-transform active:scale-[0.98] shadow-lg shadow-amber-900/10 flex items-center justify-center gap-2 mt-2">
                                        <Icon name="save" size={18} /> Zapisz paragon
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal szczegółów */}
                    {showDetailModal && selectedReceipt && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
                            <div className="bg-[#1A1206] w-full max-w-md rounded-t-3xl sm:rounded-3xl border border-amber-900/20 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl flex flex-col">
                                <div className="p-4 border-b border-[#2C251A] flex justify-between items-center sticky top-0 bg-[#1A1206] z-10">
                                    <h2 className="text-lg font-bold line-clamp-1">{selectedReceipt.title}</h2>
                                    <button onClick={() => setShowDetailModal(false)} className="p-2 bg-[#2C251A] rounded-xl text-[#A39989]">
                                        <Icon name="x" size={20} />
                                    </button>
                                </div>

                                <div className="p-5 space-y-4">
                                    <div className="flex justify-between items-center bg-[#2C251A] p-4 rounded-2xl border border-amber-900/5">
                                        <div>
                                            <span className="text-xs text-[#A39989] uppercase tracking-wider block font-semibold">Status kaucji</span>
                                            <span className={`text-sm font-bold flex items-center gap-1.5 mt-0.5 ${selectedReceipt.returned ? 'text-emerald-400' : 'text-amber-400'}`}>
                                                <Icon name={selectedReceipt.returned ? "check-circle" : "clock"} size={16} />
                                                {selectedReceipt.returned ? 'Zwrócona' : 'Oczekuje na zwrot'}
                                            </span>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-xs text-[#A39989] uppercase tracking-wider block font-semibold">Wartość</span>
                                            <span className="text-lg font-black text-emerald-400">{selectedReceipt.totalDeposit.toFixed(2)} zł</span>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 text-sm px-1">
                                        <div>
                                            <span className="text-xs text-[#A39989] block">Miejsce zakupu:</span>
                                            <span className="font-semibold text-[#FFFDEB]">{selectedReceipt.store}</span>
                                        </div>
                                        <div>
                                            <span className="text-xs text-[#A39989] block">Data operacji:</span>
                                            <span className="font-semibold text-[#FFFDEB]">{selectedReceipt.date}</span>
                                        </div>
                                    </div>

                                    <div className="border-t border-[#2C251A] pt-4">
                                        <span className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-2 px-1">Zestawienie pozycji</span>
                                        <div className="bg-[#2C251A] rounded-2xl p-3 divide-y divide-[#1A1206]/50 border border-amber-900/5">
                                            {selectedReceipt.items.map((item, idx) => (
                                                <div key={idx} className="flex justify-between items-center py-2.5 first:pt-0 last:pb-0">
                                                    <div>
                                                        <p className="text-sm font-medium text-[#FFFDEB]">{item.name}</p>
                                                        <p className="text-xs text-[#A39989] mt-0.5">{item.quantity} szt. × {item.price.toFixed(2)} zł</p>
                                                    </div>
                                                    <span className="text-sm font-semibold text-[#FFFDEB]">{(item.quantity * item.price).toFixed(2)} zł</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {selectedReceipt.image && (
                                        <div className="border-t border-[#2C251A] pt-4">
                                            <span className="text-xs font-semibold uppercase tracking-wider text-[#A39989] block mb-2 px-1">Zdjęcie dowodu zakupu</span>
                                            <div className="rounded-2xl overflow-hidden border border-amber-900/10 max-h-64 bg-[#2C251A] flex items-center justify-center shadow-inner">
                                                <img src={selectedReceipt.image} alt="Paragon" className="w-full object-contain h-full max-h-64" />
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-2 border-t border-[#2C251A] pt-4 mt-2">
                                        <button 
                                            onClick={(e) => { toggleReturned(selectedReceipt.id, e); setShowDetailModal(false); }}
                                            className={`flex-1 p-3.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 transition-transform active:scale-[0.98] ${selectedReceipt.returned ? 'bg-[#2C251A] text-[#FFFDEB] border border-amber-900/10' : 'bg-emerald-500 text-[#1A1206] shadow-lg shadow-emerald-900/10'}`}
                                        >
                                            <Icon name={selectedReceipt.returned ? "refresh-cw" : "check"} size={18} />
                                            {selectedReceipt.returned ? 'Oznacz jako nieodebrane' : 'Odbierz kaucję'}
                                        </button>
                                        <button 
                                            onClick={(e) => handleDelete(selectedReceipt.id, e)}
                                            className="p-3.5 bg-red-500/10 text-red-400 border border-red-500/20 rounded-xl hover:bg-red-500/20 transition-colors active:scale-[0.98]"
                                            title="Usuń dokument"
                                        >
                                            <Icon name="trash-2" size={18} />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
</body>
</html>

<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef, useCallback } = React;

// -----------------------------------------------------------------------
// Trwały zapis w telefonie (IndexedDB) — działa offline, nie znika po
// zamknięciu appki, nie zależy od żadnej zewnętrznej usługi.
// -----------------------------------------------------------------------
const DB_NAME = "kaucja-db";
const STORE = "receipts";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(STORE, { keyPath: "id" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function dbPut(item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// -----------------------------------------------------------------------
// helpers
// -----------------------------------------------------------------------

function compressImage(file, maxWidth = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function formatDateShort(ts) {
  return new Date(ts).toLocaleDateString("pl-PL", { day: "2-digit", month: "short" });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr);
  target.setHours(0, 0, 0, 0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

function defaultExpiry() {
  const d = new Date();
  d.setMonth(d.getMonth() + 1);
  return d.toISOString().slice(0, 10);
}

const PALETTE = {
  bg: "#0B1D16",
  bgGradA: "#0E241B",
  bgGradB: "#08140F",
  ink: "#F2EEE1",
  muted: "#93A69A",
  hairline: "rgba(242,238,225,0.10)",
  glass: "rgba(255,255,255,0.045)",
  emerald: "#3FA57A",
  emeraldDeep: "#1F6E4C",
  amber: "#CC9552",
  amberDeep: "#9C6E2E",
  garnet: "#AD3A4C",
  garnetDeep: "#7A2536",
  slate: "#7C8A82",
};

function statusColor(status, days) {
  if (status === "used") return { c: PALETTE.slate };
  if (days !== null && days < 0) return { c: PALETTE.garnet };
  if (days !== null && days <= 3) return { c: PALETTE.amber };
  return { c: PALETTE.emerald };
}

function statusText(status, days) {
  if (status === "used") return "Wykorzystany";
  if (days === null) return "Bez terminu";
  if (days < 0) return "Termin minął";
  if (days === 0) return "Ostatni dzień";
  if (days === 1) return "Jeszcze 1 dzień";
  return `Jeszcze ${days} dni`;
}

// -----------------------------------------------------------------------
// proste, własne ikony SVG (bez zewnętrznych zależności)
// -----------------------------------------------------------------------
function Icon({ name, size = 18, color = "currentColor", strokeWidth = 2 }) {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "camera":
      return <svg {...common}><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="14" r="3.5"/></svg>;
    case "check":
      return <svg {...common}><polyline points="20 6 9 17 4 12"/></svg>;
    case "undo":
      return <svg {...common}><path d="M3 10h10a5 5 0 0 1 0 10H8"/><polyline points="7 5 3 10 7 15"/></svg>;
    case "trash":
      return <svg {...common}><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/></svg>;
    case "plus":
      return <svg {...common}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    case "x":
      return <svg {...common}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "calendar":
      return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
    default:
      return null;
  }
}

// -----------------------------------------------------------------------
// foliowa pieczęć — pierścień pokazujący liczbę dni do terminu
// -----------------------------------------------------------------------
function FoilSeal({ status, days, size = 60 }) {
  const radius = (size - 8) / 2;
  const circumference = 2 * Math.PI * radius;
  const { c } = statusColor(status, days);

  let fraction = 1;
  if (status === "used") fraction = 1;
  else if (days === null) fraction = 1;
  else if (days < 0) fraction = 0;
  else fraction = Math.min(1, days / 30);

  const offset = circumference * (1 - fraction);

  let center;
  if (status === "used") center = <Icon name="check" size={20} color={c} strokeWidth={2.5} />;
  else if (days !== null && days < 0) center = <Icon name="x" size={16} color={c} strokeWidth={2.5} />;
  else center = <span style={{ color: c, fontFamily: "'Fraunces', serif" }} className="text-[17px] font-semibold leading-none">{days === null ? "∞" : days}</span>;

  return (
    <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
      <div className="absolute inset-0 rounded-full" style={{ background: "radial-gradient(circle at 32% 28%, rgba(255,255,255,0.18), rgba(0,0,0,0.35) 72%)", boxShadow: "0 3px 10px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.08)" }} />
      <svg width={size} height={size} className="absolute -rotate-90">
        <circle cx={size / 2} cy={size / 2} r={radius} stroke="rgba(255,255,255,0.12)" strokeWidth="2.5" fill="none" />
        <circle cx={size / 2} cy={size / 2} r={radius} stroke={c} strokeWidth="2.5" fill="none" strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" />
      </svg>
      <div className="relative">{center}</div>
    </div>
  );
}

// -----------------------------------------------------------------------
// karta paragonu
// -----------------------------------------------------------------------
function ImageLightbox({ image, onClose }) {
  return (
    <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: "rgba(4,10,7,0.94)" }} onClick={onClose}>
      <button onClick={onClose} className="absolute top-5 right-5 p-2 rounded-full" style={{ background: "rgba(255,255,255,0.08)", color: PALETTE.ink }} aria-label="Zamknij podgląd">
        <Icon name="x" size={22} />
      </button>
      <img src={image} alt="Podgląd paragonu" className="max-w-full max-h-full rounded-xl object-contain" style={{ boxShadow: "0 20px 60px rgba(0,0,0,0.6)" }} onClick={(e) => e.stopPropagation()} />
    </div>
  );
}

// -----------------------------------------------------------------------
// karta paragonu
// -----------------------------------------------------------------------
function ReceiptCard({ receipt, onToggle, onDelete, onOpenImage }) {
  const used = receipt.status === "used";
  const days = daysUntil(receipt.expiresAt);
  const { c } = statusColor(receipt.status, days);

  return (
    <div className="relative mb-5 rounded-2xl overflow-hidden" style={{ background: PALETTE.glass, backdropFilter: "blur(14px)", WebkitBackdropFilter: "blur(14px)", border: `1px solid ${PALETTE.hairline}`, boxShadow: "0 12px 28px rgba(0,0,0,0.35)" }}>
      <div className="relative">
        <img src={receipt.image} alt="Paragon kaucyjny" onClick={() => onOpenImage(receipt.image)} className={`w-full h-44 object-cover cursor-pointer ${used ? "grayscale opacity-60" : ""}`} />
        <div className="absolute inset-0" style={{ background: "linear-gradient(180deg, rgba(11,29,22,0) 45%, rgba(11,29,22,0.92) 100%)" }} />
        <button onClick={() => onDelete(receipt.id)} className="absolute top-3 left-3 bg-black/35 hover:bg-black/55 text-[#F2EEE1]/90 p-1.5 rounded-full transition-colors backdrop-blur-sm" aria-label="Usuń">
          <Icon name="trash" size={13} />
        </button>
        <div className="absolute -bottom-6 right-4"><FoilSeal status={receipt.status} days={days} /></div>
        <div className="absolute bottom-3 left-4 right-16">
          <div className="text-[10px] tracking-[0.18em] uppercase font-medium mb-0.5" style={{ color: c, fontFamily: "'Manrope', sans-serif" }}>{statusText(receipt.status, days)}</div>
        </div>
      </div>
      <div className="pt-9 pb-4 px-4">
        <div className="flex items-center justify-between text-[11px] mb-3" style={{ color: PALETTE.muted, fontFamily: "'JetBrains Mono', monospace" }}>
          <span>dodano {formatDateShort(receipt.addedAt)}</span>
          {receipt.expiresAt && <span>ważny do {formatDateShort(receipt.expiresAt)}</span>}
        </div>
        <div className="h-px mb-3" style={{ background: PALETTE.hairline }} />
        {used ? (
          <button onClick={() => onToggle(receipt.id)} className="w-full flex items-center justify-center gap-1.5 text-[13px] font-medium py-2.5 rounded-xl transition-colors" style={{ border: `1px solid ${PALETTE.hairline}`, color: PALETTE.ink, fontFamily: "'Manrope', sans-serif" }}>
            <Icon name="undo" size={14} /> Cofnij oznaczenie
          </button>
        ) : (
          <button onClick={() => onToggle(receipt.id)} className="w-full flex items-center justify-center gap-1.5 text-[13px] font-semibold py-2.5 rounded-xl transition-transform active:scale-[0.98]" style={{ background: `linear-gradient(135deg, ${PALETTE.amber}, ${PALETTE.amberDeep})`, color: "#1A1206", fontFamily: "'Manrope', sans-serif" }}>
            <Icon name="check" size={14} /> Oznacz jako wykorzystany
          </button>
        )}
      </div>
    </div>
  );
}

// -----------------------------------------------------------------------
// modal dodawania paragonu
// -----------------------------------------------------------------------
function AddReceiptModal({ onClose, onSave }) {
  const [preview, setPreview] = useState(null);
  const [rawFile, setRawFile] = useState(null);
  const [expiresAt, setExpiresAt] = useState(defaultExpiry());
  const [saving, setSaving] = useState(false);
  const inputRef = useRef(null);

  const pickFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setRawFile(file);
    const reader = new FileReader();
    reader.onload = (ev) => setPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleSave = async () => {
    if (!rawFile) return;
    setSaving(true);
    await onSave(rawFile, expiresAt);
    setSaving(false);
  };

  return (
    <div className="fixed inset-0 z-30 flex items-end sm:items-center justify-center" style={{ background: "rgba(4,10,7,0.72)", backdropFilter: "blur(3px)" }}>
      <div className="w-full sm:max-w-sm rounded-t-3xl sm:rounded-3xl p-6 pb-8" style={{ background: `linear-gradient(160deg, ${PALETTE.bgGradA}, ${PALETTE.bgGradB})`, border: `1px solid ${PALETTE.hairline}`, boxShadow: "0 -20px 60px rgba(0,0,0,0.5)" }}>
        <div className="flex items-center justify-between mb-5">
          <h2 style={{ fontFamily: "'Fraunces', serif", color: PALETTE.ink }} className="text-xl font-medium">Nowy paragon</h2>
          <button onClick={onClose} className="p-1 rounded-full" style={{ color: PALETTE.muted }} aria-label="Zamknij"><Icon name="x" size={20} /></button>
        </div>

        <input type="file" accept="image/*" capture="environment" ref={inputRef} onChange={pickFile} style={{ position: "absolute", width: 1, height: 1, opacity: 0, overflow: "hidden", pointerEvents: "none" }} />

        {preview ? (
          <div className="relative mb-5">
            <img src={preview} alt="Podgląd" className="w-full h-48 object-cover rounded-2xl" style={{ border: `1px solid ${PALETTE.hairline}` }} />
            <button onClick={() => inputRef.current?.click()} className="absolute bottom-3 right-3 text-[11px] font-medium px-3 py-1.5 rounded-full backdrop-blur-md" style={{ background: "rgba(0,0,0,0.45)", color: PALETTE.ink, fontFamily: "'Manrope', sans-serif" }}>Zmień zdjęcie</button>
          </div>
        ) : (
          <button onClick={() => inputRef.current?.click()} className="w-full h-48 mb-5 rounded-2xl flex flex-col items-center justify-center gap-2 transition-colors" style={{ border: `1.5px dashed ${PALETTE.hairline}`, color: PALETTE.muted }}>
            <Icon name="camera" size={26} />
            <span className="text-[13px] font-medium" style={{ fontFamily: "'Manrope', sans-serif" }}>Zrób lub wybierz zdjęcie</span>
          </button>
        )}

        <label className="block text-[10px] tracking-[0.18em] uppercase font-medium mb-2" style={{ color: PALETTE.muted, fontFamily: "'Manrope', sans-serif" }}>Termin ważności</label>
        <div className="relative mb-6">
          <div className="absolute left-4 top-1/2 -translate-y-1/2" style={{ color: PALETTE.amber }}><Icon name="calendar" size={16} /></div>
          <input type="date" value={expiresAt} onChange={(e) => setExpiresAt(e.target.value)} className="w-full pl-11 pr-4 py-3 rounded-xl text-sm focus:outline-none" style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${PALETTE.hairline}`, color: PALETTE.ink, fontFamily: "'JetBrains Mono', monospace", colorScheme: "dark" }} />
        </div>

        <button onClick={handleSave} disabled={!rawFile || saving} className="w-full flex items-center justify-center gap-2 font-semibold py-3.5 rounded-xl disabled:opacity-40 transition-transform active:scale-[0.98]" style={{ background: `linear-gradient(135deg, ${PALETTE.amber}, ${PALETTE.amberDeep})`, color: "#1A1206", fontFamily: "'Manrope', sans-serif" }}>
          <Icon name="plus" size={18} /> {saving ? "Zapisywanie…" : "Dodaj do portfela"}
        </button>
      </div>
    </div>
  );
}

// -----------------------------------------------------------------------
// aplikacja główna
// -----------------------------------------------------------------------
function KaucjaApp() {
  const [receipts, setReceipts] = useState([]);
  const [filter, setFilter] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [lightboxImage, setLightboxImage] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const items = await dbGetAll();
        setReceipts(items.sort((a, b) => b.addedAt - a.addedAt));
      } catch (e) {
        console.error("Nie udało się wczytać danych", e);
      } finally {
        setLoading(false);
      }
    })();
  }, []);

  const showToast = useCallback((msg, action) => {
    clearTimeout(toastTimer.current);
    setToast({ msg, action });
    toastTimer.current = setTimeout(() => setToast(null), 4000);
  }, []);

  const handleAddReceipt = async (file, expiresAt) => {
    setUploading(true);
    try {
      const image = await compressImage(file);
      const receipt = { id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`, image, status: "unused", addedAt: Date.now(), expiresAt: expiresAt || null };
      setReceipts((prev) => [receipt, ...prev]);
      await dbPut(receipt);
      setShowModal(false);
    } catch (err) {
      console.error(err);
      showToast("Nie udało się dodać zdjęcia");
    } finally {
      setUploading(false);
    }
  };

  const toggleStatus = async (id) => {
    let updated;
    setReceipts((prev) => prev.map((r) => {
      if (r.id === id) { updated = { ...r, status: r.status === "used" ? "unused" : "used" }; return updated; }
      return r;
    }));
    if (updated) {
      await dbPut(updated);
      if (updated.status === "used") showToast("Oznaczono jako wykorzystany", { label: "Cofnij", onClick: () => toggleStatus(id) });
    }
  };

  const deleteReceipt = async (id) => {
    setReceipts((prev) => prev.filter((r) => r.id !== id));
    try { await dbDelete(id); } catch (e) { console.error("Błąd usuwania", e); }
  };

  const sortByExpiry = (a, b) => {
    if (!a.expiresAt) return 1;
    if (!b.expiresAt) return -1;
    return new Date(a.expiresAt) - new Date(b.expiresAt);
  };

  const unused = receipts.filter((r) => r.status !== "used").sort(sortByExpiry);
  const used = receipts.filter((r) => r.status === "used").sort((a, b) => b.addedAt - a.addedAt);

  let shown;
  if (filter === "unused") shown = unused;
  else if (filter === "used") shown = used;
  else shown = [...unused, ...used];

  const expiringSoon = unused.filter((r) => { const d = daysUntil(r.expiresAt); return d !== null && d >= 0 && d <= 3; }).length;

  return (
    <div className="min-h-screen" style={{ background: `radial-gradient(circle at 50% -10%, ${PALETTE.bgGradA} 0%, ${PALETTE.bg} 45%, ${PALETTE.bgGradB} 100%)`, fontFamily: "'Manrope', sans-serif" }}>
      <div className="px-5 pt-8 pb-5">
        <div className="flex items-center gap-3 mb-1">
          <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 text-base" style={{ background: `linear-gradient(135deg, ${PALETTE.emerald}, ${PALETTE.emeraldDeep})`, boxShadow: "0 2px 8px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.15)" }}>
            ♻️
          </div>
          <div>
            <h1 style={{ fontFamily: "'Fraunces', serif", color: PALETTE.ink }} className="text-[22px] leading-none font-medium tracking-tight">Kaucja</h1>
            <p className="text-[11px] mt-1 tracking-wide" style={{ color: PALETTE.muted, fontFamily: "'JetBrains Mono', monospace" }}>Twój portfel paragonów</p>
          </div>
        </div>

        {expiringSoon > 0 && (
          <div className="mt-4 px-3.5 py-2.5 rounded-xl text-[12px] flex items-center gap-2" style={{ background: "rgba(204,149,82,0.12)", border: `1px solid rgba(204,149,82,0.25)`, color: PALETTE.amber }}>
            {expiringSoon === 1 ? "1 paragon traci ważność w ciągu 3 dni" : `${expiringSoon} paragony tracą ważność w ciągu 3 dni`}
          </div>
        )}

        <div className="mt-5 flex gap-2">
          <button onClick={() => setFilter((f) => (f === "unused" ? null : "unused"))} className="flex-1 text-[13px] font-medium py-2.5 rounded-full transition-all" style={filter === "unused" ? { background: `linear-gradient(135deg, ${PALETTE.emerald}, ${PALETTE.emeraldDeep})`, color: "#0B1D16" } : { background: "rgba(255,255,255,0.045)", border: `1px solid ${PALETTE.hairline}`, color: PALETTE.muted }}>
            Ważne · {unused.length}
          </button>
          <button onClick={() => setFilter((f) => (f === "used" ? null : "used"))} className="flex-1 text-[13px] font-medium py-2.5 rounded-full transition-all" style={filter === "used" ? { background: `linear-gradient(135deg, ${PALETTE.emerald}, ${PALETTE.emeraldDeep})`, color: "#0B1D16" } : { background: "rgba(255,255,255,0.045)", border: `1px solid ${PALETTE.hairline}`, color: PALETTE.muted }}>
            Wykorzystane · {used.length}
          </button>
        </div>
        {filter && (
          <button onClick={() => setFilter(null)} className="mt-2 text-[11px] tracking-wide" style={{ color: PALETTE.muted, fontFamily: "'JetBrains Mono', monospace" }}>
            × wyczyść filtr, pokaż wszystkie
          </button>
        )}
      </div>

      <div className="px-5 pb-28 max-w-md mx-auto">
        {loading ? (
          <div className="text-center pt-20 text-[13px]" style={{ color: PALETTE.muted, fontFamily: "'JetBrains Mono', monospace" }}>wczytywanie…</div>
        ) : shown.length === 0 ? (
          <div className="text-center pt-20 px-6">
            <div className="w-14 h-14 rounded-full mx-auto mb-4 flex items-center justify-center" style={{ border: `1px solid ${PALETTE.hairline}`, color: PALETTE.muted }}>
              <Icon name="calendar" size={22} />
            </div>
            <p style={{ fontFamily: "'Fraunces', serif", color: PALETTE.ink }} className="text-[16px] mb-1.5">{filter === "used" ? "Brak wykorzystanych" : "Portfel jest pusty"}</p>
            <p className="text-[13px]" style={{ color: PALETTE.muted }}>{filter === "used" ? "Wykorzystane paragony pojawią się tutaj." : "Dodaj zdjęcie paragonu przyciskiem poniżej."}</p>
          </div>
        ) : (
          shown.map((r) => <ReceiptCard key={r.id} receipt={r} onToggle={toggleStatus} onDelete={deleteReceipt} onOpenImage={setLightboxImage} />)
        )}
      </div>

      <button onClick={() => setShowModal(true)} disabled={uploading} className="fixed bottom-6 right-6 rounded-full w-16 h-16 flex items-center justify-center transition-transform active:scale-95 disabled:opacity-60" style={{ background: `linear-gradient(135deg, ${PALETTE.amber}, ${PALETTE.amberDeep})`, boxShadow: "0 8px 24px rgba(204,149,82,0.35), inset 0 0 0 1px rgba(255,255,255,0.2)", aria-label="Dodaj paragon" }}>
        <Icon name="plus" size={28} color="#1A1206" />
      </button>

      {showModal && <AddReceiptModal onClose={() => setShowModal(false)} onSave={handleAddReceipt} />}
      {lightboxImage && <ImageLightbox image={lightboxImage} onClose={() => setLightboxImage(null)} />}

      {toast && (
        <div className="fixed bottom-28 left-1/2 -translate-x-1/2 text-[13px] px-4 py-3 rounded-xl flex items-center gap-4 max-w-[90%] backdrop-blur-md" style={{ background: "rgba(20,40,30,0.9)", border: `1px solid ${PALETTE.hairline}`, color: PALETTE.ink }}>
          <span>{toast.msg}</span>
          {toast.action && (
            <button onClick={() => { toast.action.onClick(); setToast(null); }} className="font-semibold uppercase text-[11px] tracking-wide" style={{ color: PALETTE.amber }}>{toast.action.label}</button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KaucjaApp />);
</script>
</body>
</html>
