<style>
  @font-face {
    font-family: 'Fraunces-fallback';
    src: local('Georgia');
  }
  :root{
    --bg:#0B1D16; --bgA:#0E241B; --bgB:#08140F;
    --ink:#F2EEE1; --muted:#93A69A; --hairline:rgba(242,238,225,0.10);
    --glass:rgba(255,255,255,0.045);
    --emerald:#3FA57A; --emeraldDeep:#1F6E4C;
    --amber:#CC9552; --amberDeep:#9C6E2E;
    --garnet:#AD3A4C; --slate:#7C8A82;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); overscroll-behavior-y:none; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .serif { font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif; }
  .mono  { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
  button { font-family: inherit; cursor: pointer; }
  input  { font-family: inherit; }
  #root { min-height: 100vh; background: radial-gradient(circle at 50% -10%, var(--bgA) 0%, var(--bg) 45%, var(--bgB) 100%); color: var(--ink); }
  .card { background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border:1px solid var(--hairline); border-radius:16px; box-shadow:0 12px 28px rgba(0,0,0,.35); overflow:hidden; margin-bottom:20px; }
  .btn-amber { background: linear-gradient(135deg, var(--amber), var(--amberDeep)); color:#1A1206; font-weight:600; border:none; }
  .btn-amber:active { transform: scale(.98); }
  .pill { border-radius:999px; }
  .fade-btn { transition: transform .12s ease; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(1) saturate(2); opacity:.7; }
  .hidden-file { position:absolute; width:1px; height:1px; opacity:0; overflow:hidden; pointer-events:none; }

<body>
<div id="root"></div>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}

// =======================================================================
// trwały zapis (IndexedDB) — działa offline, nic nie znika po zamknięciu
// =======================================================================
const DB_NAME = "kaucja-db", STORE = "receipts";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE, { keyPath: "id" });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const r = tx.objectStore(STORE).getAll();
    r.onsuccess = () => resolve(r.result || []);
    r.onerror = () => reject(r.error);
  });
}
async function dbPut(item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// =======================================================================
// helpers
// =======================================================================
function compressImage(file, maxWidth, quality) {
  maxWidth = maxWidth || 900; quality = quality || 0.72;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function esc(s){ const d=document.createElement("div"); d.innerText=s==null?"":s; return d.innerHTML; }
function formatDateShort(ts){ return new Date(ts).toLocaleDateString("pl-PL",{day:"2-digit",month:"short"}); }
function daysUntil(dateStr){
  if(!dateStr) return null;
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function defaultExpiry(){ const d=new Date(); d.setMonth(d.getMonth()+1); return d.toISOString().slice(0,10); }
function statusColor(status, days){
  if(status==="used") return "var(--slate)";
  if(status==="trash") return "var(--garnet)";
  if(days!==null && days<0) return "var(--garnet)";
  if(days!==null && days<=3) return "var(--amber)";
  return "var(--emerald)";
}
function statusText(status, days){
  if(status==="used") return "Wykorzystany";
  if(days===null) return "Bez terminu";
  if(days<0) return "Termin minął";
  if(days===0) return "Ostatni dzień";
  if(days===1) return "Jeszcze 1 dzień";
  return "Jeszcze " + days + " dni";
}

// =======================================================================
// ikony SVG (bez zewnętrznych bibliotek)
// =======================================================================
function icon(name, size, color, sw){
  size = size||18; color = color||"currentColor"; sw = sw||2;
  const a = 'width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="'+sw+'" stroke-linecap="round" stroke-linejoin="round"';
  const paths = {
    camera: '<path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="14" r="3.5"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    undo: '<path d="M3 10h10a5 5 0 0 1 0 10H8"/><polyline points="7 5 3 10 7 15"/>',
    trash: '<polyline points="3 6 5 6 21 6"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"/>',
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    calendar: '<rect x="3" y="5" width="18" height="16" rx="2"/><line x1="16" y1="3" x2="16" y2="7"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="3" y1="10" x2="21" y2="10"/>'
  };
  return '<svg '+a+'>'+(paths[name]||"")+'</svg>';
}

function foilSeal(status, days, size){
  size = size || 60;
  const radius = (size-8)/2;
  const circumference = 2*Math.PI*radius;
  const c = statusColor(status, days);
  let fraction = 1;
  if(status==="used") fraction=1;
  else if(status==="trash") fraction = Math.min(1, days/30);
  else if(days===null) fraction=1;
  else if(days<0) fraction=0;
  else fraction = Math.min(1, days/30);
  const offset = circumference*(1-fraction);
  let center;
  if(status==="used") center = icon("check", 20, c, 2.5);
  else if(status==="trash") center = '<span class="serif" style="color:'+c+';font-size:17px;font-weight:600;line-height:1">'+days+'</span>';
  else if(days!==null && days<0) center = icon("x", 16, c, 2.5);
  else center = '<span class="serif" style="color:'+c+';font-size:17px;font-weight:600;line-height:1">'+(days===null?"∞":days)+'</span>';
  return ''+
  '<div style="position:relative;display:flex;align-items:center;justify-content:center;width:'+size+'px;height:'+size+'px">'+
    '<div style="position:absolute;inset:0;border-radius:999px;background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.18), rgba(0,0,0,.35) 72%);box-shadow:0 3px 10px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.08)"></div>'+
    '<svg width="'+size+'" height="'+size+'" style="position:absolute;transform:rotate(-90deg)">'+
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+radius+'" stroke="rgba(255,255,255,.12)" stroke-width="2.5" fill="none"/>'+
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+radius+'" stroke="'+c+'" stroke-width="2.5" fill="none" stroke-dasharray="'+circumference+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/>'+
    '</svg>'+
    '<div style="position:relative">'+center+'</div>'+
  '</div>';
}

// =======================================================================
// state
// =======================================================================
let state = {
  receipts: [],
  filter: null,
  loading: true,
  uploading: false,
  showModal: false,
  modalFile: null,
  modalPreview: null,
  modalExpiry: defaultExpiry(),
  lightboxImage: null,
  toast: null,
};
let toastTimer = null;

function setState(patch){ Object.assign(state, patch); render(); }

// =======================================================================
// akcje
// =======================================================================
async function loadReceipts(){
  try {
    let items = await dbGetAll();
    items = await autoPurgeExpired(items);
    items.sort((a,b)=>b.addedAt-a.addedAt);
    setState({ receipts: items, loading: false });
  } catch(e){ console.error(e); setState({ loading:false }); }
}

function showToast(msg, action){
  clearTimeout(toastTimer);
  setState({ toast: { msg, action } });
  toastTimer = setTimeout(()=> setState({ toast:null }), 4000);
}

async function onFileChosen(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => setState({ modalFile: file, modalPreview: ev.target.result });
  reader.readAsDataURL(file);
}

async function saveReceipt(){
  if(!state.modalFile) return;
  setState({ uploading: true });
  try{
    const image = await compressImage(state.modalFile);
    const receipt = { id: Date.now()+"-"+Math.random().toString(36).slice(2,8), image, status:"unused", addedAt: Date.now(), expiresAt: state.modalExpiry || null, trashedAt: null };
    const receipts = [receipt, ...state.receipts];
    await dbPut(receipt);
    setState({ receipts, uploading:false, showModal:false, modalFile:null, modalPreview:null, modalExpiry: defaultExpiry() });
  }catch(err){
    console.error(err);
    setState({ uploading:false });
    showToast("Nie udało się dodać zdjęcia");
  }
}

async function toggleStatus(id){
  const receipts = state.receipts.map(r => r.id===id ? Object.assign({}, r, { status: r.status==="used" ? "unused" : "used" }) : r);
  const updated = receipts.find(r=>r.id===id);
  setState({ receipts });
  await dbPut(updated);
  if(updated.status==="used"){
    showToast("Oznaczono jako wykorzystany", { label:"Cofnij", onClick: ()=> toggleStatus(id) });
  }
}

async function trashReceipt(id){
  const receipts = state.receipts.map(r => r.id===id ? Object.assign({}, r, { trashedAt: Date.now() }) : r);
  const updated = receipts.find(r=>r.id===id);
  setState({ receipts });
  await dbPut(updated);
  showToast("Przeniesiono do kosza", { label:"Cofnij", onClick: ()=> restoreReceipt(id) });
}

async function restoreReceipt(id){
  const receipts = state.receipts.map(r => r.id===id ? Object.assign({}, r, { trashedAt: null }) : r);
  const updated = receipts.find(r=>r.id===id);
  setState({ receipts });
  await dbPut(updated);
}

async function purgeReceipt(id){
  setState({ receipts: state.receipts.filter(r=>r.id!==id) });
  try{ await dbDelete(id); }catch(e){ console.error(e); }
}

const TRASH_RETENTION_MS = 30*24*60*60*1000;

async function autoPurgeExpired(items){
  const now = Date.now();
  const expired = items.filter(r => r.trashedAt && (now - r.trashedAt) > TRASH_RETENTION_MS);
  for(const r of expired){ try{ await dbDelete(r.id); }catch(e){ console.error(e); } }
  return items.filter(r => !(r.trashedAt && (now - r.trashedAt) > TRASH_RETENTION_MS));
}

function openModal(){ setState({ showModal:true, modalFile:null, modalPreview:null, modalExpiry: defaultExpiry() }); }
function closeModal(){ setState({ showModal:false }); }
function openImage(id){
  const r = state.receipts.find(x=>x.id===id);
  if(r) setState({ lightboxImage: r.image });
}
function closeImage(){ setState({ lightboxImage:null }); }
function setFilter(f){ setState({ filter: state.filter===f ? null : f }); }
function clearFilter(){ setState({ filter:null }); }

// =======================================================================
// render
// =======================================================================
function trashCardHTML(r){
  const daysGone = Math.floor((Date.now() - r.trashedAt)/86400000);
  const daysLeft = Math.max(0, 30 - daysGone);
  return ''+
  '<div class="card">'+
    '<div style="position:relative">'+
      '<img src="'+r.image+'" alt="Paragon" data-open="'+r.id+'" style="width:100%;height:176px;object-fit:cover;cursor:pointer;filter:grayscale(1);opacity:.55" />'+
      '<div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(11,29,22,0) 45%, rgba(11,29,22,.92) 100%)"></div>'+
      '<div style="position:absolute;bottom:-24px;right:16px">'+foilSeal("trash", daysLeft)+'</div>'+
      '<div style="position:absolute;bottom:12px;left:16px;right:64px">'+
        '<div class="mono" style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--garnet)">Usunięto '+daysGone+' dni temu</div>'+
      '</div>'+
    '</div>'+
    '<div style="padding:36px 16px 16px">'+
      '<div class="mono" style="font-size:11px;color:var(--muted);margin-bottom:12px">zniknie na stałe za '+daysLeft+' dni</div>'+
      '<div style="height:1px;background:var(--hairline);margin-bottom:12px"></div>'+
      '<div style="display:flex;gap:8px">'+
        '<button data-restore="'+r.id+'" class="fade-btn" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;padding:10px;border-radius:12px;border:1px solid var(--hairline);background:transparent;color:var(--ink)">'+icon("undo",14)+' Przywróć</button>'+
        '<button data-purge="'+r.id+'" class="fade-btn" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;padding:10px;border-radius:12px;border:1px solid rgba(173,58,76,.4);background:transparent;color:var(--garnet)">'+icon("trash",14)+' Usuń na stałe</button>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function receiptCardHTML(r){
  const used = r.status==="used";
  const days = daysUntil(r.expiresAt);
  const c = statusColor(r.status, days);
  return ''+
  '<div class="card">'+
    '<div style="position:relative">'+
      '<img src="'+r.image+'" alt="Paragon" data-open="'+r.id+'" style="width:100%;height:176px;object-fit:cover;cursor:pointer;'+(used?"filter:grayscale(1);opacity:.6;":"")+'" />'+
      '<div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(11,29,22,0) 45%, rgba(11,29,22,.92) 100%)"></div>'+
      '<button data-trash="'+r.id+'" aria-label="Usuń" style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,.35);color:rgba(242,238,225,.9);border:none;border-radius:999px;padding:7px;display:flex">'+icon("trash",13)+'</button>'+
      '<div style="position:absolute;bottom:-24px;right:16px">'+foilSeal(r.status, days)+'</div>'+
      '<div style="position:absolute;bottom:12px;left:16px;right:64px">'+
        '<div class="mono" style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:'+c+'">'+statusText(r.status,days)+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="padding:36px 16px 16px">'+
      '<div class="mono" style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:12px">'+
        '<span>dodano '+formatDateShort(r.addedAt)+'</span>'+
        (r.expiresAt ? '<span>ważny do '+formatDateShort(r.expiresAt)+'</span>' : '')+
      '</div>'+
      '<div style="height:1px;background:var(--hairline);margin-bottom:12px"></div>'+
      (used
        ? '<button data-toggle="'+r.id+'" class="fade-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:500;padding:10px;border-radius:12px;border:1px solid var(--hairline);background:transparent;color:var(--ink)">'+icon("undo",14)+' Cofnij oznaczenie</button>'
        : '<button data-toggle="'+r.id+'" class="fade-btn btn-amber" style="width:100%;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;padding:10px;border-radius:12px">'+icon("check",14)+' Oznacz jako wykorzystany</button>')+
    '</div>'+
  '</div>';
}

function modalHTML(){
  if(!state.showModal) return "";
  return ''+
  '<div id="modal-backdrop" style="position:fixed;inset:0;z-index:30;display:flex;align-items:flex-end;justify-content:center;background:rgba(4,10,7,.72);backdrop-filter:blur(3px)">'+
    '<div style="width:100%;max-width:400px;border-radius:24px 24px 0 0;padding:24px 24px 32px;background:linear-gradient(160deg, var(--bgA), var(--bgB));border:1px solid var(--hairline)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'+
        '<h2 class="serif" style="font-size:20px;font-weight:500;margin:0">Nowy paragon</h2>'+
        '<button id="modal-close" style="color:var(--muted);background:none;border:none;padding:4px;display:flex">'+icon("x",20)+'</button>'+
      '</div>'+
      '<input type="file" accept="image/*" capture="environment" id="file-input" class="hidden-file" />'+
      (state.modalPreview
        ? '<div style="position:relative;margin-bottom:20px">'+
            '<img src="'+state.modalPreview+'" style="width:100%;height:192px;object-fit:cover;border-radius:16px;border:1px solid var(--hairline)" />'+
            '<button id="modal-change" style="position:absolute;bottom:12px;right:12px;font-size:11px;font-weight:500;padding:6px 12px;border-radius:999px;background:rgba(0,0,0,.45);color:var(--ink);border:none;backdrop-filter:blur(6px)">Zmień zdjęcie</button>'+
          '</div>'
        : '<button id="modal-pick" style="width:100%;height:192px;margin-bottom:20px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1.5px dashed var(--hairline);color:var(--muted);background:transparent">'+
            icon("camera",26)+'<span style="font-size:13px;font-weight:500">Zrób lub wybierz zdjęcie</span>'+
          '</button>')+
      '<label class="mono" style="display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--muted);margin-bottom:8px">Termin ważności</label>'+
      '<div style="position:relative;margin-bottom:24px">'+
        '<div style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--amber)">'+icon("calendar",16)+'</div>'+
        '<input type="date" id="modal-date" value="'+state.modalExpiry+'" style="width:100%;padding:12px 16px 12px 44px;border-radius:12px;font-size:14px;background:rgba(255,255,255,.04);border:1px solid var(--hairline);color:var(--ink);color-scheme:dark" />'+
      '</div>'+
      '<button id="modal-save" class="btn-amber fade-btn" '+(!state.modalFile||state.uploading?"disabled":"")+' style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;font-size:14px;'+(!state.modalFile||state.uploading?"opacity:.4":"")+'">'+
        icon("plus",18)+' '+(state.uploading?"Zapisywanie…":"Dodaj do portfela")+
      '</button>'+
    '</div>'+
  '</div>';
}

function lightboxHTML(){
  if(!state.lightboxImage) return "";
  return ''+
  '<div id="lightbox-backdrop" style="position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(4,10,7,.94)">'+
    '<button id="lightbox-close" aria-label="Zamknij" style="position:absolute;top:20px;right:20px;padding:8px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--ink);border:none;display:flex">'+icon("x",22)+'</button>'+
    '<img id="lightbox-img" src="'+state.lightboxImage+'" style="max-width:100%;max-height:100%;border-radius:12px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,.6)" />'+
  '</div>';
}

function toastHTML(){
  if(!state.toast) return "";
  return ''+
  '<div style="position:fixed;bottom:112px;left:50%;transform:translateX(-50%);font-size:13px;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:16px;max-width:90%;backdrop-filter:blur(6px);background:rgba(20,40,30,.9);border:1px solid var(--hairline);color:var(--ink)">'+
    '<span>'+esc(state.toast.msg)+'</span>'+
    (state.toast.action ? '<button id="toast-action" style="font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.03em;background:none;border:none;color:var(--amber)">'+esc(state.toast.action.label)+'</button>' : '')+
  '</div>';
}

function render(){
  const unused = state.receipts.filter(r=>r.status!=="used" && !r.trashedAt).sort((a,b)=>{
    if(!a.expiresAt) return 1; if(!b.expiresAt) return -1;
    return new Date(a.expiresAt)-new Date(b.expiresAt);
  });
  const used = state.receipts.filter(r=>r.status==="used" && !r.trashedAt).sort((a,b)=>b.addedAt-a.addedAt);
  const trashed = state.receipts.filter(r=>r.trashedAt).sort((a,b)=>b.trashedAt-a.trashedAt);

  let shown, isTrashView = false;
  if(state.filter==="unused") shown = unused;
  else if(state.filter==="used") shown = used;
  else if(state.filter==="trash"){ shown = trashed; isTrashView = true; }
  else shown = unused.concat(used);

  const expiringSoon = unused.filter(r=>{ const d=daysUntil(r.expiresAt); return d!==null && d>=0 && d<=3; }).length;

  const chipStyle = (active) => active
    ? "background:linear-gradient(135deg, var(--emerald), var(--emeraldDeep));color:#0B1D16"
    : "background:rgba(255,255,255,.045);border:1px solid var(--hairline);color:var(--muted)";

  let listHTML;
  if(state.loading){
    listHTML = '<div class="mono" style="text-align:center;padding-top:80px;font-size:13px;color:var(--muted)">wczytywanie…</div>';
  } else if(shown.length===0){
    let title, sub;
    if(isTrashView){ title = "Kosz jest pusty"; sub = "Usunięte paragony pojawią się tutaj na 30 dni."; }
    else if(state.filter==="used"){ title = "Brak wykorzystanych"; sub = "Wykorzystane paragony pojawią się tutaj."; }
    else { title = "Portfel jest pusty"; sub = "Dodaj zdjęcie paragonu przyciskiem poniżej."; }
    listHTML = ''+
    '<div style="text-align:center;padding-top:80px">'+
      '<div style="width:56px;height:56px;border-radius:999px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);color:var(--muted)">'+icon("calendar",22)+'</div>'+
      '<p class="serif" style="font-size:16px;margin:0 0 6px">'+title+'</p>'+
      '<p style="font-size:13px;color:var(--muted);margin:0">'+sub+'</p>'+
    '</div>';
  } else {
    listHTML = shown.map(isTrashView ? trashCardHTML : receiptCardHTML).join("");
  }

  document.getElementById("root").innerHTML = ''+
  '<div style="padding:32px 20px 20px">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">'+
      '<div style="width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;background:linear-gradient(135deg, var(--emerald), var(--emeraldDeep));box-shadow:0 2px 8px rgba(0,0,0,.4), inset 0 0 0 1px rgba(255,255,255,.15)">♻️</div>'+
      '<div>'+
        '<h1 class="serif" style="font-size:22px;line-height:1;font-weight:500;margin:0;letter-spacing:-.01em">Kaucja</h1>'+
        '<p class="mono" style="font-size:11px;margin:4px 0 0;color:var(--muted)">Twój portfel paragonów</p>'+
      '</div>'+
    '</div>'+
    (expiringSoon>0 ? '<div style="margin-top:16px;padding:10px 14px;border-radius:12px;font-size:12px;background:rgba(204,149,82,.12);border:1px solid rgba(204,149,82,.25);color:var(--amber)">'+(expiringSoon===1?"1 paragon traci ważność w ciągu 3 dni":expiringSoon+" paragony tracą ważność w ciągu 3 dni")+'</div>' : '')+
    '<div style="margin-top:20px;display:flex;gap:8px">'+
      '<button data-filter="unused" style="flex:1;font-size:13px;font-weight:500;padding:10px 4px;border-radius:999px;border:none;'+chipStyle(state.filter==="unused")+'">Ważne · '+unused.length+'</button>'+
      '<button data-filter="used" style="flex:1;font-size:13px;font-weight:500;padding:10px 4px;border-radius:999px;border:none;'+chipStyle(state.filter==="used")+'">Wykorzystane · '+used.length+'</button>'+
      '<button data-filter="trash" style="flex:1;font-size:13px;font-weight:500;padding:10px 4px;border-radius:999px;border:none;'+chipStyle(state.filter==="trash")+'">Kosz · '+trashed.length+'</button>'+
    '</div>'+
    (state.filter ? '<button id="clear-filter" class="mono" style="margin-top:8px;font-size:11px;color:var(--muted);background:none;border:none;padding:0">× wyczyść filtr, pokaż wszystkie</button>' : '')+
  '</div>'+
  '<div style="padding:0 20px 112px;max-width:420px;margin:0 auto">'+listHTML+'</div>'+
  '<button id="fab" '+(state.uploading?"disabled":"")+' aria-label="Dodaj paragon" class="fade-btn" style="position:fixed;bottom:24px;right:24px;width:64px;height:64px;border-radius:999px;border:none;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, var(--amber), var(--amberDeep));box-shadow:0 8px 24px rgba(204,149,82,.35), inset 0 0 0 1px rgba(255,255,255,.2)">'+icon("plus",28,"#1A1206")+'</button>'+
  modalHTML() + lightboxHTML() + toastHTML();

  bindEvents();
}

function bindEvents(){
  const root = document.getElementById("root");

  document.getElementById("fab").addEventListener("click", openModal);

  root.querySelectorAll("[data-filter]").forEach(el=>{
    el.addEventListener("click", ()=> setFilter(el.getAttribute("data-filter")));
  });
  const cf = document.getElementById("clear-filter");
  if(cf) cf.addEventListener("click", clearFilter);

  root.querySelectorAll("[data-open]").forEach(el=>{
    el.addEventListener("click", ()=> openImage(el.getAttribute("data-open")));
  });
  root.querySelectorAll("[data-trash]").forEach(el=>{
    el.addEventListener("click", ()=> trashReceipt(el.getAttribute("data-trash")));
  });
  root.querySelectorAll("[data-restore]").forEach(el=>{
    el.addEventListener("click", ()=> restoreReceipt(el.getAttribute("data-restore")));
  });
  root.querySelectorAll("[data-purge]").forEach(el=>{
    el.addEventListener("click", ()=> purgeReceipt(el.getAttribute("data-purge")));
  });
  root.querySelectorAll("[data-toggle]").forEach(el=>{
    el.addEventListener("click", ()=> toggleStatus(el.getAttribute("data-toggle")));
  });

  // modal
  const backdrop = document.getElementById("modal-backdrop");
  if(backdrop){
    backdrop.addEventListener("click", (e)=>{ if(e.target===backdrop) closeModal(); });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    const fileInput = document.getElementById("file-input");
    fileInput.addEventListener("change", onFileChosen);
    const pick = document.getElementById("modal-pick");
    if(pick) pick.addEventListener("click", ()=> fileInput.click());
    const change = document.getElementById("modal-change");
    if(change) change.addEventListener("click", ()=> fileInput.click());
    const dateInput = document.getElementById("modal-date");
    dateInput.addEventListener("change", (e)=>{ state.modalExpiry = e.target.value; });
    document.getElementById("modal-save").addEventListener("click", saveReceipt);
  }

  // lightbox
  const lb = document.getElementById("lightbox-backdrop");
  if(lb){
    lb.addEventListener("click", (e)=>{ if(e.target===lb) closeImage(); });
    document.getElementById("lightbox-close").addEventListener("click", closeImage);
    document.getElementById("lightbox-img").addEventListener("click", (e)=> e.stopPropagation());
  }

  // toast
  const ta = document.getElementById("toast-action");
  if(ta && state.toast && state.toast.action){
    ta.addEventListener("click", ()=>{ state.toast.action.onClick(); setState({ toast:null }); });
  }
}

render();
loadReceipts();
</script>
</body>
</html>
